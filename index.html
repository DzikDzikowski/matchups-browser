<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyszukiwarka Matchupów LoL</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --panel-bg: #252525;
            --text-color: #e0e0e0;
            --accent-color: #c8aa6e; 
            --pool-color: #00d2ff;     
            --border-color: #333;
            --danger-color: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }

        h2 {
            font-size: 1.1em;
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .pool-management-panel {
            background-color: var(--panel-bg);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .custom-select-container {
            position: relative;
            margin-bottom: 15px;
        }

        .custom-select-input {
            width: 100%;
            padding: 10px 12px;
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .custom-select-input:focus {
            outline: none;
            border-color: var(--pool-color);
        }

        .custom-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .custom-select-dropdown.show {
            display: flex;
        }

        .dropdown-item {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: background-color 0.2s;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background-color: #3a3a3a;
        }

        .dropdown-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--accent-color);
            object-fit: cover;
            background-color: #121212;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .champ-tag {
            background-color: #101b2b; 
            border: 1px solid var(--pool-color);
            color: var(--pool-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .champ-tag .remove-btn {
            cursor: pointer;
            color: #888;
            font-weight: bold;
            font-size: 14px;
        }

        .champ-tag .remove-btn:hover {
            color: var(--danger-color);
        }

        .file-upload {
            font-size: 14px;
            color: #aaa;
            padding: 10px;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            text-align: center;
        }

        .results-header {
            font-size: 1.2em;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .counters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .champion-card {
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .champion-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
        }

        .champion-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            margin-bottom: 8px;
            object-fit: cover;
        }

        .champion-card.pool-champion {
            background-color: rgba(0, 210, 255, 0.05); 
            border-color: rgba(0, 210, 255, 0.3);
        }

        .champion-card.pool-champion .champion-icon {
            border-color: var(--pool-color); 
        }

        .champion-card.pool-champion:hover {
            border-color: var(--pool-color); 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5); 
        }

        .champion-name {
            font-size: 14px;
            font-weight: bold;
        }

        .no-results {
            color: #888;
            font-style: italic;
        }

        .upload-prompt {
            color: var(--accent-color);
            font-size: 1.1em;
            text-align: center;
            padding: 30px 10px;
            border: 1px dashed var(--accent-color);
            border-radius: 8px;
            background-color: rgba(200, 170, 110, 0.05);
        }
        
        .no-suggestions {
            padding: 12px;
            color: #777;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wyszukiwarka Kontr</h1>
        
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Wpisz pick przeciwnika (np. Aatrox, Garen)...">
            
            <div class="pool-management-panel">
                <h2>Twoje najlepsze picki:</h2>
                
                <div class="custom-select-container">
                    <input type="text" id="poolSearchInput" class="custom-select-input" placeholder="Wyszukaj i wybierz championa, aby dodać...">
                    <div id="champDropdown" class="custom-select-dropdown">
                    </div>
                </div>

                <div id="tagsContainer" class="tags-container">
                </div>
            </div>

            <div class="file-upload">
                <label for="csvFileInput">Wgraj plik z bazą danych (CSV): </label>
                <input type="file" id="csvFileInput" accept=".csv">
            </div>
        </div>

        <div id="resultsContainer">
            </div>
    </div>

    <script>
        const allLeagueChampions = [
            "Aatrox", "Ahri", "Akali", "Akshan", "Alistar", "Ambessa", "Amumu", "Anivia", "Annie", "Aphelios",
            "Ashe", "Aurelion Sol", "Aurora", "Azir", "Bard", "Bel'Veth", "Blitzcrank", "Brand", "Braum", "Briar",
            "Caitlyn", "Camille", "Cassiopeia", "Cho'Gath", "Corki", "Darius", "Diana", "Dr. Mundo", "Draven", "Ekko",
            "Elise", "Evelynn", "Ezreal", "Fiddlesticks", "Fiora", "Fizz", "Galio", "Gangplank", "Garen", "Gnar",
            "Gragas", "Graves", "Gwen", "Hecarim", "Heimerdinger", "Hwei", "Illaoi", "Irelia", "Ivern", "Janna",
            "Jarvan IV", "Jax", "Jayce", "Jhin", "Jinx", "K'Sante", "Kai'Sa", "Kalista", "Karma", "Karthus",
            "Kassadin", "Katarina", "Kayle", "Kayn", "Kennen", "Kha'Zix", "Kindred", "Kled", "Kog'Maw", "LeBlanc",
            "Lee Sin", "Leona", "Lillia", "Lissandra", "Locke", "Lucian", "Lulu", "Lux", "Malphite", "Malzahar", "Maokai",
            "Master Yi", "Mel", "Milio", "Miss Fortune", "Mordekaiser", "Morgana", "Naafiri", "Nami", "Nasus", "Nautilus", "Neeko",
            "Nidalee", "Nilah", "Nocturne", "Nunu & Willump", "Olaf", "Orianna", "Ornn", "Pantheon", "Poppy", "Pyke",
            "Qiyana", "Quinn", "Rakan", "Rammus", "Rek'Sai", "Rell", "Renata Glasc", "Renekton", "Rengar", "Riven",
            "Rumble", "Ryze", "Samira", "Sejuani", "Senna", "Seraphine", "Sett", "Shaco", "Shen", "Shyvana",
            "Singed", "Sion", "Sivir", "Skarner", "Smolder", "Sona", "Soraka", "Swain", "Sylas", "Syndra",
            "Tahm Kench", "Taliyah", "Talon", "Taric", "Teemo", "Thresh", "Tristana", "Trundle", "Tryndamere", "Twisted Fate",
            "Twitch", "Udyr", "Urgot", "Varus", "Vayne", "Veigar", "Vel'Koz", "Vex", "Vi", "Viego",
            "Viktor", "Vladimir", "Volibear", "Warwick", "Wukong", "Xayah", "Xerath", "Xin Zhao", "Yasuo", "Yone",
            "Yorick", "Yunara", "Yuumi", "Zac", "Zaahen", "Zed", "Zeri", "Ziggs", "Zilean", "Zoe", "Zyra"
        ];

        let myChampionPool = JSON.parse(localStorage.getItem('lolMyPool')) || ['yone', 'sion', 'renekton', 'ambessa'];
        let database = [];

        function normalizeChampionName(name) {
            let trimmed = name.trim();
            let lower = trimmed.toLowerCase();
            const corrections = {
                "malaphite": "Malphite",
                "malaphte": "Malphite",
                "renkton": "Renekton",
                "orn": "Ornn",
                "zahhen": "Zaahen",
                "k'sante": "K'Sante"
            };
            return corrections[lower] || trimmed;
        }

        function init() {
            // Zawsze zaczynamy od czystej bazy po odświeżeniu
            database = []; 

            populateDropdown('');
            renderPoolTags();
            setupEventListeners();
            displayResults('');
        }

        function parseCSV(csvText) {
            database = [];
            const lines = csvText.split('\n');
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = line.split(',');
                const enemy = normalizeChampionName(parts[0]);
                const counters = parts.slice(1).map(c => normalizeChampionName(c)).filter(c => c !== '');
                
                if (enemy) {
                    database.push({ enemy, counters });
                }
            }
        }

        function getImageUrl(champName) {
            let name = champName;
            const exceptions = {
                "wukong": "MonkeyKing",
                "dr. mundo": "DrMundo",
                "k'sante": "KSante",
                "cho'gath": "Chogath",
                "rek'sai": "RekSai",
                "bel'veth": "Belveth",
                "kai'sa": "Kaisa",
                "kha'zix": "Khazix",
                "leblanc": "Leblanc",
                "vel'koz": "Velkoz",
                "kog'maw": "KogMaw",
                "nunu & willump": "Nunu",
                "renata glasc": "Renata",
                "jarvan iv": "JarvanIV"
            };

            const lowerName = name.toLowerCase().trim();
            if (exceptions[lowerName]) {
                name = exceptions[lowerName];
            } else {
                name = name.split(/[\s'.]+/).map(part => {
                    if(!part) return "";
                    return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
                }).join('');
            }

            return `http://ddragon.leagueoflegends.com/cdn/16.8.1/img/champion/${name}.png`;
        }

        function populateDropdown(filterText) {
            const dropdown = document.getElementById('champDropdown');
            dropdown.innerHTML = '';

            const searchLower = filterText.toLowerCase();
            const filtered = allLeagueChampions.filter(champ => champ.toLowerCase().includes(searchLower));

            if (filtered.length === 0) {
                dropdown.innerHTML = '<div class="no-suggestions">Nie znaleziono postaci</div>';
                return;
            }

            filtered.forEach(champName => {
                const champLower = champName.toLowerCase();
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                
                const imgUrl = getImageUrl(champName);
                
                item.innerHTML = `
                    <img src="${imgUrl}" alt="${champName}" onerror="this.style.opacity='0'">
                    <span>${champName}</span>
                `;
                
                item.addEventListener('click', () => {
                    addChampionToPool(champLower);
                    dropdown.classList.remove('show');
                    document.getElementById('poolSearchInput').value = ''; 
                });
                
                dropdown.appendChild(item);
            });
        }

        function renderPoolTags() {
            const container = document.getElementById('tagsContainer');
            container.innerHTML = '';
            
            myChampionPool.forEach(champ => {
                const tag = document.createElement('div');
                tag.className = 'champ-tag';
                const formattedName = champ.split(/[\s'.]+/).map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()).join(' ');
                
                tag.innerHTML = `
                    <span>${formattedName}</span>
                    <span class="remove-btn" onclick="removeChampionFromPool('${champ}')">&times;</span>
                `;
                container.appendChild(tag);
            });
            
            localStorage.setItem('lolMyPool', JSON.stringify(myChampionPool));
        }

        function addChampionToPool(name) {
            if (name && !myChampionPool.includes(name)) {
                myChampionPool.push(name);
                renderPoolTags();
                const currentQuery = document.getElementById('searchInput').value;
                displayResults(currentQuery);
            }
        }

        window.removeChampionFromPool = function(champName) {
            myChampionPool = myChampionPool.filter(c => c !== champName);
            renderPoolTags();
            const currentQuery = document.getElementById('searchInput').value;
            displayResults(currentQuery);
        }

        function displayResults(query) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            if (database.length === 0) {
                container.innerHTML = '<div class="upload-prompt">Wgraj plik z bazą danych (CSV) w panelu powyżej, aby móc korzystać z wyszukiwarki.</div>';
                return;
            }

            if (!query) {
                container.innerHTML = '<div class="no-results">Wpisz nazwę championa przeciwnika, aby zobaczyć kontry.</div>';
                return;
            }

            const searchLower = query.toLowerCase();
            const match = database.find(entry => entry.enemy.toLowerCase() === searchLower) || 
                          database.find(entry => entry.enemy.toLowerCase().includes(searchLower));

            if (!match) {
                container.innerHTML = '<div class="no-results">Nie znaleziono takiego championa w bazie.</div>';
                return;
            }

            const header = document.createElement('div');
            header.className = 'results-header';
            header.innerHTML = `Gramy na: <strong>${match.enemy}</strong>`;
            container.appendChild(header);

            if (match.counters.length === 0) {
                container.innerHTML += '<div class="no-results">Brak przypisanych kontr dla tego championa.</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'counters-grid';

            const poolCounters = [];
            const otherCounters = [];

            match.counters.forEach(counter => {
                const isPoolChampion = myChampionPool.includes(counter.toLowerCase().trim());
                if (isPoolChampion) {
                    poolCounters.push(counter);
                } else {
                    otherCounters.push(counter);
                }
            });

            const sortedCounters = [...poolCounters, ...otherCounters];

            sortedCounters.forEach(counter => {
                const card = document.createElement('div');
                card.className = 'champion-card';
                
                const isPoolChampion = myChampionPool.includes(counter.toLowerCase().trim());
                if (isPoolChampion) {
                    card.classList.add('pool-champion');
                }
                
                const imgUrl = getImageUrl(counter);
                
                card.innerHTML = `
                    <img class="champion-icon" src="${imgUrl}" alt="${counter}" onerror="this.style.display='none'">
                    <div class="champion-name">${counter}</div>
                `;
                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                displayResults(e.target.value);
            });

            const poolSearchInput = document.getElementById('poolSearchInput');
            const dropdown = document.getElementById('champDropdown');

            poolSearchInput.addEventListener('input', (e) => {
                populateDropdown(e.target.value);
                dropdown.classList.add('show');
            });

            poolSearchInput.addEventListener('focus', () => {
                populateDropdown(poolSearchInput.value);
                dropdown.classList.add('show');
            });

            document.addEventListener('click', (e) => {
                if (!poolSearchInput.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });

            document.getElementById('csvFileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const text = event.target.result;
                        // Usunięto zapisywanie bazy do localStorage
                        parseCSV(text);
                        alert('Baza danych została wgrana pomyślnie!');
                        
                        const currentQuery = document.getElementById('searchInput').value;
                        displayResults(currentQuery);
                    };
                    reader.readAsText(file);
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
