<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyszukiwarka Matchupów LoL</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --panel-bg: #252525;
            --text-color: #e0e0e0;
            --accent-color: #c8aa6e; /* Złoty kolor w stylu LoL-a */
            --pool-color: #00d2ff;   /* Kolor wyróżnienia dla Twojego poolu */
            --border-color: #333;
            --danger-color: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }

        h2 {
            font-size: 1.1em;
            color: var(--pool-color);
            margin-top: 0;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Styl nowego panelu champion poolu */
        .pool-management-panel {
            background-color: var(--panel-bg);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .pool-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .pool-input {
            flex: 1;
            padding: 8px 12px;
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
        }

        .pool-input:focus {
            outline: none;
            border-color: var(--pool-color);
        }

        .btn-add {
            padding: 8px 16px;
            background-color: #005f73;
            color: white;
            border: 1px solid var(--pool-color);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-add:hover {
            background-color: #0a9396;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .champ-tag {
            background-color: #14213d;
            border: 1px solid var(--pool-color);
            color: var(--pool-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .champ-tag .remove-btn {
            cursor: pointer;
            color: var(--danger-color);
            font-weight: bold;
            font-size: 14px;
        }

        .champ-tag .remove-btn:hover {
            color: #ff1a1a;
        }

        .file-upload {
            font-size: 14px;
            color: #aaa;
            padding: 10px;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            text-align: center;
        }

        .results-header {
            font-size: 1.2em;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .counters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .champion-card {
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .champion-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
        }

        .champion-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            margin-bottom: 8px;
            object-fit: cover;
        }

        /* --- Style dla spersonalizowanego poolu championów --- */
        .champion-card.pool-champion .champion-icon {
            border-color: var(--pool-color);
        }

        .champion-card.pool-champion:hover {
            border-color: var(--pool-color);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
        }

        .champion-name {
            font-size: 14px;
            font-weight: bold;
        }

        .no-results {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wyszukiwarka Kontr</h1>
        
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Wpisz pick przeciwnika (np. Aatrox, Garen)...">
            
            <div class="pool-management-panel">
                <h2>Twój Champion Pool (Niebieskie wyróżnienie)</h2>
                <div class="pool-input-group">
                    <input type="text" id="newChampInput" class="pool-input" placeholder="Wpisz nazwę postaci i kliknij Dodaj...">
                    <button id="addChampBtn" class="btn-add">Dodaj</button>
                </div>
                <div id="tagsContainer" class="tags-container">
                    </div>
            </div>

            <div class="file-upload">
                <label for="csvFileInput">Zaktualizuj bazę (wgraj plik CSV): </label>
                <input type="file" id="csvFileInput" accept=".csv">
            </div>
        </div>

        <div id="resultsContainer">
            </div>
    </div>

    <script>
        // Domyślna baza danych osadzona w kodzie
        const defaultCSV = `Pick enemy,Kontra 1,Kontra 2,Kontra 3,Kontra 4,Kontra 5,Kontra 6,Kontra 7,Kontra 8
Aatrox,Yone,Ambessa,Renekton,,,,,
Akali,Sion,,,,,,,
Camille,Renekton,Yone,,,,,,
Cho'Gath,Yone ,Zaahen,Ambessa,,,,,
Darius,Yone,,,,,,,
Dr. Mundo,Yone,Zaahen,,,,,,
Fiora,Ambessa,Renekton,Rumble,Jayce,,,,
Gangplank,Yone,,,,,,,
Garen,Ambessa,Renekton,Rumble,Jayce,,,,
Gnar,Yasuo,Yone,Rumble,Jayce,,,,
Illaoi,Yasuo,,,,,,,
Irelia,,,,,,,,
Jax,Sion,,,,,,,
Jayce,Yasuo,,,,,,,
Kayle,Ambessa,Yone,,,,,,
Kled,,,,,,,,
K'Sante,Ambessa,,,,,,,
Malphite,Rumble,,,,,,,
Maokai,Aatrox,Ambessa,Yone,,,,,
Mordekaiser,Yone,,,,,,,
Nasus,Zaahen,,,,,,,
Ornn,Yone,Zaahen,Ambessa,,,,,
Pantheon,Orn,Sion,,,,,,
Quinn,Malaphte,,,,,,,
Renekton,Sion,Orn,,,,,,
Rengar,,,,,,,,
Riven,Zaahen,Renkton,,,,,,
Rumble,Aatrox,Yasuo,,,,,,
Ryze,Yasuo,,,,,,,
Sett,Renekton,,,,,,,
Shen,Rumble,Ambessa,Zaahen,,,,,
Singed,Zaahen,Yone,,,,,,
Sion,Yone,Zaahen,Ambessa,,,,,
Swain,Yasuo,Yone,Zaahen,,,,,
Teemo,,,,,,,,
Trundle,,,,,,,,
Tryndamere,Malaphite,Renekton,,,,,,
Urgot,k'sante,,,,,,,
Vayne,Malaphite,,,,,,,
Vladimir,Yone,Zaahen,,,,,,
Volibear,Zaahen,Renekton,,,,,,
Warwick,,,,,,,,
Wukong,Ambessa,Zahhen,SIon,Orn,,,,
Yasuo,Renekton,,,,,,,
Yone,Renekton,,,,,,,
Yorick,Yone,Yasuo,,,,,,
Zac,Zaahen,,,,,,,
Kennen,,,,,,,,
Zaahen,wszystkoxd,,,,,,,
Gwen,Yone,,,,,,,
Ambessa,Renekton,Yasuo,,,,,,
Smolder,,,,,,,,
Aurora,Yasuo,,,,,,,
Olaf,Orn,,,,,,,
Poppy,,,,,,,,
Rek'Sai,,,,,,,,
Udyr,,,,,,,,
Sylas,Zaahen,Yasuo,,,,,,
Gragas,Zaahen,Ambessa,,,,,,
Akshan,Yasuo,Malaphite,,,,,,
Sejuani,,,,,,,,
Graves,,,,,,,,
Heimerdinger,Yasuo,,,,,,,
Karma,Yasuo,Ambessa,SIon,,,,,
Naafiri,,,,,,,,
Cassiopeia,Yasuo,,,,,,,
Tahm Kench,,,,,,,,
Skarner,,,,,,,,
Varus,Yasuo,Malaphite,,,,,,
Shyvana,,,,,,,,`;

        // Ładowanie listy z localStorage lub użycie domyślnej, jeśli pusta
        let myChampionPool = JSON.parse(localStorage.getItem('lolMyPool')) || ['yone', 'sion', 'renekton', 'zaahen', 'ambessa'];
        let database = [];

        // Inicjalizacja
        function init() {
            parseCSV(defaultCSV);
            renderPoolTags();
            setupEventListeners();
            displayResults('');
        }

        // Parsowanie tekstu CSV do tablicy obiektów
        function parseCSV(csvText) {
            database = [];
            const lines = csvText.split('\n');
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = line.split(',');
                const enemy = parts[0].trim();
                const counters = parts.slice(1)
                                      .map(c => c.trim())
                                      .filter(c => c !== '');
                
                if (enemy) {
                    database.push({ enemy, counters });
                }
            }
        }

        // Przygotowanie linku do obrazka
        function getImageUrl(champName) {
            let name = champName;
            const overrides = {
                "malaphite": "Malphite",
                "malaphte": "Malphite",
                "renkton": "Renekton",
                "orn": "Ornn",
                "sion": "Sion",
                "k'sante": "KSante",
                "cho'gath": "Chogath",
                "dr. mundo": "DrMundo",
                "wukong": "MonkeyKing",
                "rek'sai": "RekSai"
            };

            const lowerName = name.toLowerCase();
            if (overrides[lowerName]) {
                name = overrides[lowerName];
            } else {
                name = name.replace(/['\s.]/g, '');
                name = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
            }

            return `http://ddragon.leagueoflegends.com/cdn/16.8.1/img/champion/${name}.png`;
        }

        // Renderowanie wizualnych tagów w panelu zarządzania poolu
        function renderPoolTags() {
            const container = document.getElementById('tagsContainer');
            container.innerHTML = '';
            
            myChampionPool.forEach(champ => {
                const tag = document.createElement('div');
                tag.className = 'champ-tag';
                // Wyświetlamy z wielkiej litery dla estetyki
                const formattedName = champ.charAt(0).toUpperCase() + champ.slice(1);
                
                tag.innerHTML = `
                    <span>${formattedName}</span>
                    <span class="remove-btn" onclick="removeChampionFromPool('${champ}')">&times;</span>
                `;
                container.appendChild(tag);
            });
            
            // Zapis do localStorage, aby zmiany nie znikały po odświeżeniu
            localStorage.setItem('lolMyPool', JSON.stringify(myChampionPool));
        }

        // Dodawanie postaci do poolu
        function addChampionToPool() {
            const input = document.getElementById('newChampInput');
            const name = input.value.trim().toLowerCase();
            
            if (name && !myChampionPool.includes(name)) {
                myChampionPool.push(name);
                input.value = '';
                renderPoolTags();
                
                // Odśwież wyniki wyszukiwania na bieżąco
                const currentQuery = document.getElementById('searchInput').value;
                displayResults(currentQuery);
            }
        }

        // Usuwanie postaci z poolu
        window.removeChampionFromPool = function(champName) {
            myChampionPool = myChampionPool.filter(c => c !== champName);
            renderPoolTags();
            
            // Odśwież wyniki wyszukiwania na bieżąco
            const currentQuery = document.getElementById('searchInput').value;
            displayResults(currentQuery);
        }

        // Wyświetlanie wyników wyszukiwania kontr
        function displayResults(query) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            if (!query) {
                container.innerHTML = '<div class="no-results">Wpisz nazwę championa, aby zobaczyć kontry.</div>';
                return;
            }

            const searchLower = query.toLowerCase();
            const match = database.find(entry => entry.enemy.toLowerCase() === searchLower) || 
                          database.find(entry => entry.enemy.toLowerCase().includes(searchLower));

            if (!match) {
                container.innerHTML = '<div class="no-results">Nie znaleziono takiego championa w bazie.</div>';
                return;
            }

            const header = document.createElement('div');
            header.className = 'results-header';
            header.innerHTML = `Gramy na: <strong>${match.enemy}</strong>`;
            container.appendChild(header);

            if (match.counters.length === 0) {
                container.innerHTML += '<div class="no-results">Brak przypisanych kontr dla tego championa.</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'counters-grid';

            // Podział kontr dynamicznie na podstawie aktualnego stanu 'myChampionPool'
            const poolCounters = [];
            const otherCounters = [];

            match.counters.forEach(counter => {
                const isPoolChampion = myChampionPool.includes(counter.toLowerCase().trim());
                if (isPoolChampion) {
                    poolCounters.push(counter);
                } else {
                    otherCounters.push(counter);
                }
            });

            const sortedCounters = [...poolCounters, ...otherCounters];

            sortedCounters.forEach(counter => {
                const card = document.createElement('div');
                card.className = 'champion-card';
                
                const isPoolChampion = myChampionPool.includes(counter.toLowerCase().trim());
                if (isPoolChampion) {
                    card.classList.add('pool-champion');
                }
                
                const imgUrl = getImageUrl(counter);
                
                card.innerHTML = `
                    <img class="champion-icon" src="${imgUrl}" alt="${counter}" onerror="this.style.display='none'">
                    <div class="champion-name">${counter}</div>
                `;
                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        // Nasłuchiwanie zdarzeń
        function setupEventListeners() {
            // Szukanie kontr live
            document.getElementById('searchInput').addEventListener('input', (e) => {
                displayResults(e.target.value);
            });

            // Przyciski i akcje dodawania postaci do poolu
            document.getElementById('addChampBtn').addEventListener('click', addChampionToPool);
            document.getElementById('newChampInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addChampionToPool();
            });

            // Wgrywanie nowego pliku bazy CSV
            document.getElementById('csvFileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const text = event.target.result;
                        parseCSV(text);
                        alert('Baza danych została zaktualizowana!');
                        
                        const currentQuery = document.getElementById('searchInput').value;
                        if (currentQuery) displayResults(currentQuery);
                    };
                    reader.readAsText(file);
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
